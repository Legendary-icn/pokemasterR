<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster Elite v11.0 - Auto-Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --red: #ff1f1f; --bg: #0d0d0d; --panel: #1a1a1e; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        .top-nav { 
            display: flex; background: #000; overflow-x: auto; position: sticky; top: 0; z-index: 1000;
            border-bottom: 2px solid var(--neon); scrollbar-width: none;
        }
        .top-nav button {
            flex: 1; padding: 15px; border: none; background: none; color: #666;
            font-size: 0.7rem; font-weight: bold; cursor: pointer; text-transform: uppercase;
            min-width: 90px; transition: 0.3s;
        }
        .top-nav button.active { color: var(--neon); background: rgba(0, 242, 255, 0.1); }
        .top-nav button i { display: block; font-size: 1.2rem; margin-bottom: 4px; }

        #vision-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-bottom: 1px solid #333; display: block; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; } /* Canvas oculto para procesar la imagen */
        
        #ghost-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; opacity: 0.5; pointer-events: none; display: none;
            border: 2px solid var(--neon); border-radius: 12px; box-shadow: 0 0 20px var(--neon);
        }

        .scan-status { 
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); 
            padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; color: var(--neon);
            border: 1px solid var(--neon);
        }

        .cam-bar { background: #111; padding: 10px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
        select { background: #222; color: var(--neon); border: 1px solid var(--neon); padding: 8px; border-radius: 5px; flex: 1; font-size: 14px; outline: none; }

        .content { padding: 15px; }
        .panel { display: none; }
        .active-panel { display: block; animation: fadeIn 0.4s; }

        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; outline: none; font-size: 16px; }
        .btn { background: var(--neon); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        
        .res-card { background: var(--panel); padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .res-card img { width: 60px; border-radius: 4px; }
        .price { color: #00ff88; font-weight: bold; font-size: 1.1rem; }

        .dex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .dex-item { background: var(--panel); padding: 8px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        .dex-item img { width: 100%; border-radius: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="top-nav">
    <button class="active" onclick="showTab('val', this)"><i class="fas fa-camera"></i> Escáner</button>
    <button onclick="showTab('vf', this)"><i class="fas fa-microscope"></i> V/F Check</button>
    <button onclick="showTab('dex', this)"><i class="fas fa-box-archive"></i> Mi Dex</button>
</nav>

<div id="cam-controls" class="cam-bar">
    <i class="fas fa-video" style="color: var(--neon)"></i>
    <select id="camSelect" onchange="initCamera()"></select>
    <button class="btn" style="padding: 5px 10px;" onclick="initCamera()"><i class="fas fa-sync-alt"></i></button>
</div>

<div id="vision-container">
    <div class="scan-status" id="scan-label">SISTEMA LISTO</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <img id="ghost-overlay" src="">
</div>

<div class="content">
    <div id="tab-val" class="panel active-panel">
        <p style="font-size: 0.8rem; color: #888;">Pon la carta frente a la cámara. La IA leerá el nombre automáticamente.</p>
        <div id="results-val"></div>
    </div>

    <div id="tab-vf" class="panel">
        <div class="search-box">
            <input type="text" id="vfInput" placeholder="Nombre (Ej: Venonat 13)">
            <button class="btn" onclick="masterSearch('vf')">CARGAR GHOST</button>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <button class="btn" style="flex:1" onclick="toggleGhost('front')">FRENTE</button>
            <button class="btn" style="flex:1; background:#333; color:white;" onclick="toggleGhost('back')">REVERSO</button>
        </div>
        <input type="range" min="0" max="100" value="50" style="width:100%" oninput="document.getElementById('ghost-overlay').style.opacity = this.value/100">
        <div id="results-vf" style="margin-top:10px"></div>
    </div>

    <div id="tab-dex" class="panel">
        <div id="dex-list" class="dex-grid"></div>
    </div>
</div>

<script>
    let activeStream;
    let vfGhostImg = "";
    let isScanning = false;
    const SCRYDEX_API_KEY = "52089a37-0a73-4782-ebfd-496bc5f101ac";
    const BACK_IMAGE = "https://images.pokemontcg.io/swsh1/back.png";

    // 1. GESTIÓN DE CÁMARA
    async function listCameras() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoIn = devices.filter(d => d.kind === 'videoinput');
        const select = document.getElementById('camSelect');
        select.innerHTML = videoIn.map((d, i) => `<option value="${d.deviceId}">${d.label || 'Cámara ' + (i+1)}</option>`).join('');
        if (videoIn.length > 0) initCamera();
    }

    async function initCamera() {
        if (activeStream) activeStream.getTracks().forEach(t => t.stop());
        const id = document.getElementById('camSelect').value;
        try {
            activeStream = await navigator.mediaDevices.getUserMedia({ 
                video: { deviceId: id ? {exact: id} : undefined, facingMode: "environment" } 
            });
            document.getElementById('video').srcObject = activeStream;
            startAutoScan(); // Iniciar el bucle de la IA
        } catch (e) { alert("Error cámara: " + e); }
    }

    // 2. EL ESCÁNER REAL (IA OCR)
    async function startAutoScan() {
        if(isScanning) return;
        isScanning = true;
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const label = document.getElementById('scan-label');

        setInterval(async () => {
            if(document.getElementById('tab-val').classList.contains('active-panel')) {
                label.innerText = "ESCANEANDO...";
                
                // Capturamos un frame del video
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                try {
                    // Tesseract lee el texto de la imagen
                    const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                    const detectedName = text.split('\n')[0].replace(/[^a-zA-Z ]/g, "").trim();
                    
                    if(detectedName.length > 3) {
                        label.innerText = "DETECTADO: " + detectedName;
                        autoSearch(detectedName);
                    }
                } catch (e) { console.log("IA ocupada..."); }
            }
        }, 2500); // Intenta leer cada 2.5 segundos
    }

    // 3. BÚSQUEDA AUTOMÁTICA (RESULTADOS)
    async function autoSearch(name) {
        const url = `https://api.pokemontcg.io/v2/cards?q=name:"${encodeURIComponent(name)}"*&pageSize=3`;
        try {
            const res = await fetch(url, { headers: { "X-Api-Key": SCRYDEX_API_KEY } });
            const { data } = await res.json();
            if(data && data.length > 0) {
                document.getElementById('results-val').innerHTML = data.map(c => `
                    <div class="res-card">
                        <img src="${c.images.small}">
                        <div style="flex:1">
                            <b>${c.name}</b> (${c.number}/${c.set.total})<br>
                            <span class="price">$${c.tcgplayer?.latestPrices?.holofoil?.market || c.tcgplayer?.latestPrices?.normal?.market || 'N/A'}</span>
                        </div>
                        <button class="btn" onclick="saveToDex('${c.name}', '${c.images.small}')">+</button>
                    </div>
                `).join('');
            }
        } catch (e) { console.error("Error en búsqueda"); }
    }

    // 4. BÚSQUEDA V/F (GHOST) - CORREGIDA
    async function masterSearch(type) {
        const q = document.getElementById('vfInput').value;
        if(!q) return;

        const url = `https://api.pokemontcg.io/v2/cards?q=name:"${encodeURIComponent(q)}"*&pageSize=5`;
        try {
            const res = await fetch(url, { headers: { "X-Api-Key": SCRYDEX_API_KEY } });
            const { data } = await res.json();
            
            if(data && data.length > 0) {
                // Mostrar referencias debajo para que el usuario elija cuál poner Ghost
                document.getElementById('results-vf').innerHTML = data.map((c, i) => `
                    <div class="res-card" onclick="setGhostImg('${c.images.large}')">
                        <img src="${c.images.small}">
                        <div style="flex:1"><b>${c.name}</b> #${c.number}</div>
                        <span style="font-size:0.7rem; color:var(--neon)">TAP PARA GHOST</span>
                    </div>
                `).join('');
            } else {
                alert("No se encontró esa carta.");
            }
        } catch (e) { alert("Error de red en V/F Check"); }
    }

    function setGhostImg(url) {
        vfGhostImg = url;
        toggleGhost('front');
        alert("¡Imagen cargada! Mira el visor arriba.");
    }

    function toggleGhost(mode) {
        const g = document.getElementById('ghost-overlay');
        if(!vfGhostImg && mode === 'front') { alert("Busca y selecciona una carta abajo."); return; }
        g.style.display = 'block';
        g.src = (mode === 'front') ? vfGhostImg : BACK_IMAGE;
    }

    // 5. NAVEGACIÓN Y DEX
    function showTab(tabId, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.querySelectorAll('.top-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active-panel');
        btn.classList.add('active');
        if(tabId === 'dex') renderDex();
    }

    function saveToDex(name, img) {
        let dex = JSON.parse(localStorage.getItem('pokedex_v11') || '[]');
        dex.push({ name, img });
        localStorage.setItem('pokedex_v11', JSON.stringify(dex));
        alert("Guardada.");
    }

    function renderDex() {
        const dex = JSON.parse(localStorage.getItem('pokedex_v11') || '[]');
        document.getElementById('dex-list').innerHTML = dex.map(c => `<div class="dex-item"><img src="${c.img}"><p style="font-size:0.6rem">${c.name}</p></div>`).join('');
    }

    window.onload = listCameras;
</script>
</body>
</html>
