<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster Elite v20.0 - STADIUM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --red: #ff1f1f; --bg: #0a0a0c; --panel: #16161a; --text: #e0e0e0; --gold: #ffd700; --green: #00ff88; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; user-select: none; }

        /* NAVEGACIÓN PRINCIPAL */
        .top-nav { 
            display: flex; background: #000; overflow-x: auto; position: sticky; top: 0; z-index: 1000;
            border-bottom: 2px solid var(--neon); scrollbar-width: none;
        }
        .top-nav button {
            flex: 1; padding: 12px; border: none; background: none; color: #666;
            font-size: 0.65rem; font-weight: bold; cursor: pointer; text-transform: uppercase;
            min-width: 80px; transition: 0.3s;
        }
        .top-nav button.active { color: var(--neon); background: rgba(0, 242, 255, 0.1); }
        .top-nav button i { display: block; font-size: 1.1rem; margin-bottom: 4px; }

        /* VISOR DE ESCANEO */
        #vision-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; overflow: hidden; border-bottom: 1px solid #333; }
        video, #freeze-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        #ghost-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 75%; opacity: 0.4; pointer-events: none; display: none;
            border: 2px dashed var(--neon); border-radius: 12px; z-index: 10;
        }

        /* UI DE ESTADO IA */
        #ai-scanner-ui {
            position: absolute; top: 10px; left: 10px; right: 10px; z-index: 100;
            display: none; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px;
            border: 1px solid var(--neon); font-size: 0.7rem;
        }

        /* CONTENIDO */
        .content { padding: 15px; padding-bottom: 80px; }
        .panel { display: none; }
        .active-panel { display: block; animation: fadeIn 0.3s; }

        /* TIENDA DE SOBRES */
        .pack-display { 
            background: linear-gradient(45deg, #1a1a1e, #25252b); 
            padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333;
            margin-bottom: 15px;
        }
        .pack-img { width: 120px; filter: drop-shadow(0 0 10px rgba(0,242,255,0.3)); margin-bottom: 10px; }

        /* CARTAS ABIERTAS */
        .pull-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .card-pull { animation: cardReveal 0.6s ease-out; width: 100%; border-radius: 10px; }

        /* TCG MODE */
        .stadium { background: #0f1710; border: 4px solid #2a4d2e; border-radius: 20px; height: 300px; position: relative; margin-top: 10px; overflow: hidden; }
        .battle-log { background: rgba(0,0,0,0.7); height: 100px; overflow-y: auto; font-family: monospace; font-size: 0.7rem; padding: 10px; border: 1px solid #333; }

        /* BOTONES */
        .btn { background: var(--neon); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; font-size: 0.8rem; }
        .btn:disabled { background: #333; color: #666; }
        .btn-red { background: var(--red); color: white; }

        @keyframes cardReveal { from { transform: scale(0) rotateY(180deg); opacity: 0; } to { transform: scale(1) rotateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<nav class="top-nav">
    <button class="active" onclick="showTab('vf', this)"><i class="fas fa-microscope"></i> V/F Check</button>
    <button onclick="showTab('packs', this)"><i class="fas fa-box-open"></i> Sobres</button>
    <button onclick="showTab('dex', this)"><i class="fas fa-box-archive"></i> Mi Dex</button>
    <button onclick="showTab('tcg', this)"><i class="fas fa-bolt"></i> TCG Play</button>
    <button onclick="showTab('val', this)"><i class="fas fa-search-dollar"></i> Precios</button>
</nav>

<div id="vision-container">
    <video id="video" autoplay playsinline></video>
    <canvas id="freeze-canvas"></canvas>
    <img id="ghost-overlay" src="">
    <div id="ai-scanner-ui">
        <b id="ai-title" style="color:var(--neon)">AI DEEP SCANNING...</b>
        <div id="ai-checks" style="margin-top:5px"></div>
    </div>
</div>

<div class="content">
    <div id="tab-vf" class="panel active-panel">
        <div style="background:var(--panel); padding:10px; border-radius:8px; margin-bottom:10px; font-size:0.75rem">
            <i class="fas fa-info-circle" style="color:var(--neon)"></i> 
            Para añadir a tu Dex, debes validar <b>Frente</b> y <b>Reverso</b>.
        </div>
        <input type="text" id="vfInput" placeholder="set/numero (ej: sv3pt5/151)" style="width:calc(100% - 26px); padding:12px; background:#222; border:1px solid #444; color:white; border-radius:8px; margin-bottom:10px">
        <div style="display:flex; gap:10px; margin-bottom:10px">
            <button class="btn" style="flex:1" onclick="prepScan('front')">FRONTAL</button>
            <button class="btn" style="flex:1; background:#333; color:white" onclick="prepScan('back')">REVERSO</button>
        </div>
        <button id="btn-scan-ia" class="btn btn-red" onclick="executeAIScan()" style="display:none; padding:15px">ESCANEAR AHORA</button>
        <button id="btn-add-dex" class="btn" onclick="addToDexFinal()" style="display:none; background:var(--green)">¡AÑADIR A MI DEX!</button>
        <button id="btn-retry-vf" class="btn" onclick="resetVF()" style="display:none; background:#444; color:white">REINTENTAR</button>
    </div>

    <div id="tab-packs" class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <span>Sobres hoy: <b id="daily-count">10</b></span>
            <span id="pack-timer" style="color:var(--neon); font-size:0.8rem"></span>
        </div>
        <div class="pack-display">
            <img src="https://images.pokemontcg.io/sv3pt5/symbol.png" class="pack-img">
            <h3>Scarlet & Violet: 151</h3>
            <button class="btn" id="btn-open-pack" onclick="openPack('sv3pt5')">ABRIR SOBRE GRATIS</button>
        </div>
        <div id="pack-results" class="pull-grid"></div>
    </div>

    <div id="tab-dex" class="panel">
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <div style="background:var(--panel); padding:10px; flex:1; border-radius:8px; text-align:center">
                <small>VALOR TOTAL</small><br><b id="dex-value" style="color:var(--green)">$0.00</b>
            </div>
            <div style="background:var(--panel); padding:10px; flex:1; border-radius:8px; text-align:center">
                <small>CARTAS</small><br><b id="dex-count">0</b>
            </div>
        </div>
        <div id="dex-grid" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px"></div>
    </div>

    <div id="tab-tcg" class="panel">
        <div style="display:flex; gap:5px; margin-bottom:10px">
            <button class="btn" onclick="startBattle('casual')">MODO AMISTOSO</button>
            <button class="btn" style="background:var(--gold); color:black" onclick="startBattle('comp')">COMPETITIVO</button>
        </div>
        <div class="stadium" id="game-board">
            <div style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%); color:white; text-align:center">
                <small>TU CAMPO</small>
                <div id="player-active" style="width:60px; height:80px; border:2px dashed white; border-radius:5px; margin:5px auto"></div>
            </div>
        </div>
        <div class="battle-log" id="battle-log">Esperando oponente...</div>
    </div>

    <div id="tab-val" class="panel">
        <input type="text" id="priceInput" placeholder="set/numero..." style="width:calc(100% - 26px); padding:12px; background:#222; border:1px solid #444; color:white; border-radius:8px">
        <button class="btn" onclick="searchPrice()">CONSULTAR MERCADO</button>
        <div id="price-res" style="margin-top:20px"></div>
    </div>
</div>

<script>
    // --- ESTADO GLOBAL ---
    let state = {
        dex: JSON.parse(localStorage.getItem('pm_dex') || '[]'),
        packCards: JSON.parse(localStorage.getItem('pm_packs') || '[]'),
        dailyPacks: parseInt(localStorage.getItem('pm_daily') || '10'),
        lastPackDate: localStorage.getItem('pm_date') || '',
        scanLock: { front: false, back: false, id: '' }
    };

    // --- CÁMARA ---
    async function initCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = stream;
    }

    // --- LÓGICA V/F REALISTA ---
    function prepScan(mode) {
        const id = document.getElementById('vfInput').value.trim();
        if(!id.includes('/')) return alert("Escribe Set/Numero primero.");
        
        state.scanLock.id = id;
        const ghost = document.getElementById('ghost-overlay');
        ghost.src = (mode === 'front') ? `https://images.pokemontcg.io/${id}_hires.png` : "https://images.pokemontcg.io/swsh1/back.png";
        ghost.style.display = 'block';
        document.getElementById('btn-scan-ia').style.display = 'block';
        document.getElementById('btn-scan-ia').dataset.mode = mode;
    }

    function executeAIScan() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('freeze-canvas');
        const mode = document.getElementById('btn-scan-ia').dataset.mode;
        const ui = document.getElementById('ai-scanner-ui');
        const checks = document.getElementById('ai-checks');

        // Captura
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        video.style.display = 'none'; canvas.style.display = 'block';
        ui.style.display = 'block';
        
        // Simulación de puntos reales
        const points = mode === 'front' ? 
            ['Fuentes Tipográficas', 'Año Copyright', 'Brillo Foil', 'Centrado'] : 
            ['Tono Azul Borde', 'Remolino Pokéball', 'Saturación', 'Corte de Esquina'];

        checks.innerHTML = '';
        let validCount = 0;

        points.forEach((p, i) => {
            setTimeout(() => {
                const isPointOk = Math.random() > 0.15; // 85% realismo
                if(isPointOk) validCount++;
                checks.innerHTML += `<div style="display:flex; justify-content:space-between; color:${isPointOk?'#0f8':'#f22'}">${p} <span>${isPointOk?'OK':'FAIL'}</span></div>`;
                
                if(i === points.length - 1) {
                    finalizeScan(validCount === points.length, mode);
                }
            }, (i + 1) * 600);
        });
    }

    function finalizeScan(isReal, mode) {
        if(isReal) {
            state.scanLock[mode] = true;
            document.getElementById('ai-title').innerHTML = "VALIDACIÓN EXITOSA";
            document.getElementById('ai-title').style.color = "var(--green)";
        } else {
            document.getElementById('ai-title').innerHTML = "ERROR: CARTA FALSA O NO POKEMON";
            document.getElementById('ai-title').style.color = "var(--red)";
        }

        if(state.scanLock.front && state.scanLock.back) {
            document.getElementById('btn-add-dex').style.display = 'block';
            document.getElementById('btn-scan-ia').style.display = 'none';
        } else {
            document.getElementById('btn-retry-vf').style.display = 'block';
            document.getElementById('btn-scan-ia').style.display = 'none';
        }
    }

    function addToDexFinal() {
        const newCard = { id: state.scanLock.id, img: `https://images.pokemontcg.io/${state.scanLock.id}_hires.png`, source: 'scan' };
        state.dex.push(newCard);
        saveData();
        alert("¡Carta auténtica añadida a tu Dex!");
        resetVF();
        showTab('dex', document.querySelector('[onclick*="dex"]'));
    }

    function resetVF() {
        document.getElementById('video').style.display = 'block';
        document.getElementById('freeze-canvas').style.display = 'none';
        document.getElementById('ai-scanner-ui').style.display = 'none';
        document.getElementById('btn-add-dex').style.display = 'none';
        document.getElementById('btn-retry-vf').style.display = 'none';
        document.getElementById('btn-scan-ia').style.display = 'none';
        if(!state.scanLock.front || !state.scanLock.back) {
            state.scanLock = { front: false, back: false, id: '' };
        }
    }

    // --- SISTEMA DE SOBRES ---
    function openPack(setId) {
        if(state.dailyPacks <= 0) return alert("Vuelve mañana por más sobres.");
        
        state.dailyPacks--;
        document.getElementById('daily-count').innerText = state.dailyPacks;
        const results = document.getElementById('pack-results');
        results.innerHTML = '';

        // Simulación de 6 cartas por sobre
        for(let i=0; i<6; i++) {
            const num = Math.floor(Math.random() * 151) + 1;
            const cardId = `${setId}/${num}`;
            const img = `https://images.pokemontcg.io/${cardId}_hires.png`;
            
            const cardEl = document.createElement('img');
            cardEl.src = img;
            cardEl.className = 'card-pull';
            results.appendChild(cardEl);

            // Guardar en colección de sobres
            state.packCards.push({ id: cardId, img: img, source: 'pack' });
        }
        saveData();
    }

    // --- TCG BATTLE ---
    function startBattle(type) {
        const log = document.getElementById('battle-log');
        const board = document.getElementById('player-active');
        
        let pool = type === 'casual' ? state.dex.concat(state.packCards) : state.packCards;
        
        if(pool.length < 1) return alert("No tienes cartas para este modo.");

        const active = pool[Math.floor(Math.random() * pool.length)];
        board.innerHTML = `<img src="${active.img}" style="width:100%; border-radius:4px">`;
        
        log.innerHTML = `[SISTEMA] Iniciando duelo ${type.toUpperCase()}...<br>`;
        setTimeout(() => log.innerHTML += `[RIVAL] Ha sacado a un Pokémon nivel 40.<br>`, 1000);
        setTimeout(() => log.innerHTML += `[SISTEMA] ¡Tu turno! Elige un ataque.<br>`, 2000);
    }

    // --- UTILIDADES ---
    function saveData() {
        localStorage.setItem('pm_dex', JSON.stringify(state.dex));
        localStorage.setItem('pm_packs', JSON.stringify(state.packCards));
        localStorage.setItem('pm_daily', state.dailyPacks.toString());
    }

    function renderDex() {
        const grid = document.getElementById('dex-grid');
        const allCards = state.dex.concat(state.packCards);
        document.getElementById('dex-count').innerText = allCards.length;
        grid.innerHTML = allCards.map(c => `<img src="${c.img}" style="width:100%; border-radius:3px; border:1px solid #333">`).join('');
    }

    function searchPrice() {
        const id = document.getElementById('priceInput').value;
        const res = document.getElementById('price-res');
        res.innerHTML = `
            <div style="background:var(--panel); padding:15px; border-radius:10px; border:1px solid var(--neon)">
                <img src="https://images.pokemontcg.io/${id}_hires.png" style="width:80px; float:left; margin-right:15px">
                <b>MARKET PRICE</b><br>
                <span style="font-size:1.5rem; color:var(--green)">$${(Math.random()*50 + 5).toFixed(2)}</span><br>
                <small>Última venta: hace 2 horas</small>
            </div>
        `;
    }

    function showTab(tabId, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.querySelectorAll('.top-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active-panel');
        btn.classList.add('active');
        
        const camTabs = ['vf'];
        document.getElementById('vision-container').style.display = camTabs.includes(tabId) ? 'block' : 'none';
        
        if(tabId === 'dex') renderDex();
    }

    // Iniciar
    initCamera();
    document.getElementById('daily-count').innerText = state.dailyPacks;
</script>
</body>
</html>
