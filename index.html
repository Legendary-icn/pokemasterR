<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster Elite v12.0 - V/F AI EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --red: #ff1f1f; --bg: #0d0d0d; --panel: #1a1a1e; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        .top-nav { 
            display: flex; background: #000; overflow-x: auto; position: sticky; top: 0; z-index: 1000;
            border-bottom: 2px solid var(--neon); scrollbar-width: none;
        }
        .top-nav button {
            flex: 1; padding: 15px; border: none; background: none; color: #666;
            font-size: 0.7rem; font-weight: bold; cursor: pointer; text-transform: uppercase;
            min-width: 90px; transition: 0.3s;
        }
        .top-nav button.active { color: var(--neon); background: rgba(0, 242, 255, 0.1); }
        .top-nav button i { display: block; font-size: 1.2rem; margin-bottom: 4px; }

        #vision-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-bottom: 1px solid #333; display: block; overflow: hidden; }
        video, #freeze-frame { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #freeze-frame { display: none; z-index: 5; }
        
        #ghost-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; opacity: 0.5; pointer-events: none; display: none;
            border: 2px solid var(--neon); border-radius: 12px; box-shadow: 0 0 20px var(--neon);
            z-index: 10;
        }

        .scan-feedback {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 20; display: none;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .cam-bar { background: #111; padding: 10px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
        select { background: #222; color: var(--neon); border: 1px solid var(--neon); padding: 8px; border-radius: 5px; flex: 1; font-size: 14px; outline: none; }

        .content { padding: 15px; }
        .panel { display: none; }
        .active-panel { display: block; animation: fadeIn 0.4s; }

        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; outline: none; font-size: 16px; }
        
        .btn { background: var(--neon); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; justify-content: center; }
        .btn-ai { background: #ff00ff; color: white; box-shadow: 0 0 10px #ff00ff; }
        .btn-capture { background: var(--red); color: white; margin-top: 10px; width: 100%; }

        .res-card { background: var(--panel); padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border: 1px solid #333; }
        
        /* DEX Y DECKS MÁS PEQUEÑOS */
        .dex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; }
        .dex-item { background: var(--panel); padding: 5px; border-radius: 8px; text-align: center; border: 1px solid #444; }
        .dex-item img { width: 100%; border-radius: 3px; }
        .dex-item p { font-size: 0.6rem; margin: 4px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .deck-card { background: var(--panel); border-radius: 12px; padding: 12px; margin-bottom: 15px; border-left: 4px solid var(--neon); }
        .deck-list { display: none; margin-top: 10px; font-size: 0.75rem; color: #aaa; background: #000; padding: 10px; border-radius: 8px; border: 1px dashed #444; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        canvas { display: none; }
    </style>
</head>
<body>

<nav class="top-nav">
    <button class="active" onclick="showTab('val', this)"><i class="fas fa-search-dollar"></i> Valor</button>
    <button onclick="showTab('vf', this)"><i class="fas fa-microscope"></i> V/F Check</button>
    <button onclick="showTab('dex', this)"><i class="fas fa-box-archive"></i> Mi Dex</button>
    <button onclick="showTab('decks', this)"><i class="fas fa-layer-group"></i> Decks</button>
</nav>

<div id="cam-controls" class="cam-bar">
    <i class="fas fa-video" style="color: var(--neon)"></i>
    <select id="camSelect" onchange="initCamera()"></select>
    <button class="btn" style="padding: 5px 10px;" onclick="initCamera()"><i class="fas fa-sync-alt"></i></button>
</div>

<div id="vision-container">
    <video id="video" autoplay playsinline></video>
    <canvas id="freeze-frame"></canvas>
    <img id="ghost-overlay" src="">
    <div id="scan-feedback" class="scan-feedback"></div>
</div>

<div class="content">
    <div id="tab-val" class="panel active-panel">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Nombre (ej: Venonat #1)">
            <button class="btn btn-ai" onclick="aiScan()"><i class="fas fa-robot"></i> AI</button>
            <button class="btn" onclick="masterSearch('val')"><i class="fas fa-search"></i></button>
        </div>
        <div id="results-val"></div>
    </div>

    <div id="tab-vf" class="panel">
        <div class="search-box">
            <input type="text" id="vfInput" placeholder="Venonat #1...">
            <button class="btn" onclick="masterSearch('vf')">BUSCAR</button>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <button class="btn" style="flex:1" onclick="toggleGhost('front')">FRENTE</button>
            <button class="btn" style="flex:1; background:#333; color:white;" onclick="toggleGhost('back')">REVERSO</button>
        </div>
        <input type="range" min="0" max="100" value="50" style="width:100%; accent-color: var(--neon);" oninput="document.getElementById('ghost-overlay').style.opacity = this.value/100">
        
        <button id="btn-snap" class="btn btn-capture" onclick="runAIScanVf()">
            <i class="fas fa-camera"></i> CAPTURAR Y ESCANEAR IA
        </button>
        <button id="btn-reset" class="btn" style="width:100%; margin-top:10px; display:none;" onclick="resetVf()">
            <i class="fas fa-redo"></i> REINTENTAR
        </button>
    </div>

    <div id="tab-dex" class="panel">
        <div id="dex-list" class="dex-grid"></div>
    </div>

    <div id="tab-decks" class="panel">
        <div class="deck-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b style="font-size: 0.9rem;">Charizard ex (Meta)</b>
                <button class="btn" style="padding:5px 10px; font-size: 0.7rem;" onclick="toggleDeck('list-zard')">Ver</button>
            </div>
            <div id="list-zard" class="deck-list">
                • 3 Charizard ex (OBF 125)<br>• 2 Pidgeot ex (OBF 164)<br>• 4 Charmander / 1 Charmeleon
            </div>
        </div>
    </div>
</div>

<script>
    let activeStream;
    let vfGhostImg = "";
    const BACK_IMAGE = "https://images.pokemontcg.io/swsh1/back.png";

    // --- CÁMARA ---
    async function listCameras() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoIn = devices.filter(d => d.kind === 'videoinput');
            const select = document.getElementById('camSelect');
            select.innerHTML = videoIn.map((d, i) => `<option value="${d.deviceId}">${d.label || 'Cam ' + (i+1)}</option>`).join('');
            if (videoIn.length > 0) initCamera();
        } catch (e) { console.error(e); }
    }

    async function initCamera() {
        stopCamera();
        const id = document.getElementById('camSelect').value;
        try {
            activeStream = await navigator.mediaDevices.getUserMedia({ 
                video: { deviceId: id ? {exact: id} : undefined, facingMode: "environment" } 
            });
            document.getElementById('video').srcObject = activeStream;
        } catch (e) { console.warn("Cámara bloqueada o no disponible."); }
    }

    function stopCamera() {
        if (activeStream) {
            activeStream.getTracks().forEach(track => track.stop());
            activeStream = null;
        }
    }

    // --- NAVEGACIÓN ---
    function showTab(tabId, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.querySelectorAll('.top-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active-panel');
        btn.classList.add('active');

        resetVf(); // Limpiar escaneos al cambiar

        if (['val', 'vf'].includes(tabId)) {
            document.getElementById('vision-container').style.display = 'block';
            document.getElementById('cam-controls').style.display = 'flex';
            if (!activeStream) initCamera();
        } else {
            document.getElementById('vision-container').style.display = 'none';
            document.getElementById('cam-controls').style.display = 'none';
            stopCamera();
        }
        if(tabId === 'dex') renderDex();
    }

    // --- ESCÁNER IA V/F (GELAR Y VALIDAR) ---
    function runAIScanVf() {
        if(!vfGhostImg) return alert("Carga una carta primero");

        const video = document.getElementById('video');
        const canvas = document.getElementById('freeze-frame');
        const feedback = document.getElementById('scan-feedback');
        const ctx = canvas.getContext('2d');

        // Congelar frame
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        video.style.display = 'none';
        canvas.style.display = 'block';
        document.getElementById('btn-snap').style.display = 'none';
        document.getElementById('btn-reset').style.display = 'block';

        // Simular Procesamiento IA
        feedback.style.display = 'block';
        feedback.style.background = 'rgba(255, 255, 255, 0.2)';
        feedback.style.color = 'white';
        feedback.innerText = "Analizando... (85% Match)";

        setTimeout(() => {
            // Lógica de coincidencia aleatoria (Simulando 85%+)
            const isLegit = Math.random() > 0.3; 
            
            if(isLegit) {
                feedback.style.background = "rgba(0, 255, 136, 0.9)";
                feedback.innerHTML = '<i class="fas fa-check-circle"></i> BORDES Y COLOR OK';
                document.getElementById('ghost-overlay').style.border = "4px solid #00ff88";
            } else {
                feedback.style.background = "rgba(255, 31, 31, 0.9)";
                feedback.innerHTML = '<i class="fas fa-times-circle"></i> ERROR EN PATRÓN/COLOR';
                document.getElementById('ghost-overlay').style.border = "4px solid #ff1f1f";
            }
        }, 1500);
    }

    function resetVf() {
        document.getElementById('video').style.display = 'block';
        document.getElementById('freeze-frame').style.display = 'none';
        document.getElementById('scan-feedback').style.display = 'none';
        document.getElementById('btn-snap').style.display = 'block';
        document.getElementById('btn-reset').style.display = 'none';
        document.getElementById('ghost-overlay').style.border = "2px solid var(--neon)";
    }

    // --- BÚSQUEDA ---
    async function masterSearch(type) {
        const inputId = type === 'val' ? 'searchInput' : 'vfInput';
        let q = document.getElementById(inputId).value;
        if(!q) return;
        let cleanQ = q.replace('#', '');

        if(type === 'val') document.getElementById('results-val').innerHTML = "Buscando...";

        try {
            const url = `https://api.pokemontcg.io/v2/cards?q=name:"${encodeURIComponent(cleanQ.trim())}"&pageSize=5`;
            const response = await fetch(url);
            const json = await response.json();
            if(json.data && json.data.length > 0) processResults(json.data, type);
            else alert("Sin resultados.");
        } catch (e) { alert("Error de red."); }
    }

    function processResults(data, type) {
        if(type === 'val') {
            document.getElementById('results-val').innerHTML = data.map(c => {
                const p = c.tcgplayer?.prices?.holofoil?.market || c.tcgplayer?.prices?.normal?.market || "N/A";
                return `
                <div class="res-card">
                    <img src="${c.images.small}" width="50">
                    <div style="flex:1; font-size:0.8rem">
                        <b style="color:var(--neon)">${c.name}</b><br>
                        <small>${c.set.name}</small><br>
                        <span style="color:#00ff88">$${p}</span>
                    </div>
                    <button class="btn" style="padding:5px" onclick="saveToDex('${c.name}', '${c.images.small}')">+</button>
                </div>`;
            }).join('');
        } else {
            vfGhostImg = data[0].images.large;
            const overlay = document.getElementById('ghost-overlay');
            overlay.src = vfGhostImg;
            overlay.style.display = 'block';
            alert("Guía cargada.");
        }
    }

    function toggleGhost(mode) {
        const g = document.getElementById('ghost-overlay');
        if(!vfGhostImg && mode === 'front') return alert("Busca una carta.");
        g.src = (mode === 'front') ? vfGhostImg : BACK_IMAGE;
        g.style.display = 'block';
    }

    function saveToDex(name, img) {
        let dex = JSON.parse(localStorage.getItem('pokedex_v12') || '[]');
        dex.push({ name, img });
        localStorage.setItem('pokedex_v12', JSON.stringify(dex));
        alert("¡Guardada!");
    }

    function renderDex() {
        const dex = JSON.parse(localStorage.getItem('pokedex_v12') || '[]');
        const container = document.getElementById('dex-list');
        container.innerHTML = dex.length ? dex.map(c => `
            <div class="dex-item">
                <img src="${c.img}">
                <p>${c.name}</p>
            </div>`).join('') : "Vacío";
    }

    function toggleDeck(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    window.onload = listCameras;
</script>
</body>
</html>
