<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster Elite v11.0 - Scrydex Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --magenta: #ff00ff; --bg: #0d0d0d; --panel: #1a1a1e; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Navegación */
        .top-nav { 
            display: flex; background: #000; position: sticky; top: 0; z-index: 1000;
            border-bottom: 2px solid var(--neon); scrollbar-width: none;
        }
        .top-nav button {
            flex: 1; padding: 15px; border: none; background: none; color: #666;
            font-size: 0.7rem; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .top-nav button.active { color: var(--neon); background: rgba(0, 242, 255, 0.1); }
        .top-nav button i { display: block; font-size: 1.2rem; margin-bottom: 4px; }

        /* Cámara y Visión */
        #vision-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-bottom: 1px solid #333; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #ghost-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; opacity: 0.5; pointer-events: none; display: none;
            border: 2px solid var(--neon); border-radius: 15px; box-shadow: 0 0 25px var(--neon);
        }

        .cam-bar { background: #111; padding: 10px; display: flex; align-items: center; gap: 10px; }
        select { background: #222; color: var(--neon); border: 1px solid var(--neon); padding: 8px; border-radius: 5px; flex: 1; outline: none; }

        /* Contenido */
        .content { padding: 15px; }
        .panel { display: none; }
        .active-panel { display: block; animation: fadeIn 0.4s; }

        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; outline: none; font-size: 16px; }
        
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-main { background: var(--neon); color: #000; }
        .btn-ai { background: var(--magenta); color: white; box-shadow: 0 0 10px var(--magenta); }
        .btn:active { transform: scale(0.95); }

        /* Resultados */
        .res-card { background: var(--panel); padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; border: 1px solid #333; }
        .res-card img { width: 70px; border-radius: 5px; }
        .price { color: #00ff88; font-weight: bold; font-size: 1.2rem; display: block; margin-top: 5px; }

        .dex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .dex-item { background: var(--panel); padding: 8px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        .dex-item img { width: 100%; border-radius: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="top-nav">
    <button class="active" onclick="showTab('val', this)"><i class="fas fa-search-dollar"></i> Valor</button>
    <button onclick="showTab('vf', this)"><i class="fas fa-microscope"></i> V/F Check</button>
    <button onclick="showTab('dex', this)"><i class="fas fa-box-archive"></i> Mi Dex</button>
</nav>

<div id="cam-controls" class="cam-bar">
    <select id="camSelect" onchange="initCamera()"></select>
    <button class="btn btn-main" onclick="initCamera()"><i class="fas fa-sync"></i></button>
</div>

<div id="vision-container">
    <video id="video" autoplay playsinline></video>
    <img id="ghost-overlay" src="">
</div>

<div class="content">
    <div id="tab-val" class="panel active-panel">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Nombre (Ej: Pikachu 151)">
            <button class="btn btn-ai" onclick="aiScan()"><i class="fas fa-robot"></i> AI</button>
            <button class="btn btn-main" onclick="masterSearch('val')"><i class="fas fa-search"></i></button>
        </div>
        <div id="results-val"></div>
    </div>

    <div id="tab-vf" class="panel">
        <div class="search-box">
            <input type="text" id="vfInput" placeholder="Nombre para comparar...">
            <button class="btn btn-main" onclick="masterSearch('vf')">CARGAR</button>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <button class="btn btn-main" style="flex:1" onclick="toggleGhost('front')">FRENTE</button>
            <button class="btn" style="flex:1; background:#333; color:white;" onclick="toggleGhost('back')">REVERSO</button>
        </div>
        <input type="range" min="0" max="100" value="50" style="width:100%; accent-color: var(--neon);" oninput="document.getElementById('ghost-overlay').style.opacity = this.value/100">
    </div>

    <div id="tab-dex" class="panel">
        <div id="dex-list" class="dex-grid"></div>
    </div>
</div>

<script>
    let activeStream;
    let currentLargeImg = "";
    // Tu llave de Scrydex / Pokémon TCG API
    const API_KEY = "52089a37-0a73-4782-ebfd-496bc5f101ac"; 
    const CARD_BACK = "https://images.pokemontcg.io/swsh1/back.png";

    // --- GESTIÓN DE CÁMARA ---
    async function listCameras() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoIn = devices.filter(d => d.kind === 'videoinput');
            const select = document.getElementById('camSelect');
            select.innerHTML = videoIn.map((d, i) => `<option value="${d.deviceId}">${d.label || 'Cámara ' + (i+1)}</option>`).join('');
            if (videoIn.length > 0) initCamera();
        } catch (e) { console.error("Error cámaras:", e); }
    }

    async function initCamera() {
        if (activeStream) activeStream.getTracks().forEach(t => t.stop());
        const id = document.getElementById('camSelect').value;
        try {
            activeStream = await navigator.mediaDevices.getUserMedia({ 
                video: { deviceId: id ? {exact: id} : undefined, facingMode: "environment" } 
            });
            document.getElementById('video').srcObject = activeStream;
        } catch (e) { console.warn("Fallo al iniciar cámara."); }
    }

    // --- LÓGICA DE BÚSQUEDA (SCRYDEX / PKMN API) ---
    async function masterSearch(type) {
        const query = document.getElementById(type === 'val' ? 'searchInput' : 'vfInput').value;
        if(!query) return;

        const resultsDiv = document.getElementById('results-val');
        if(type === 'val') resultsDiv.innerHTML = "<p style='color:var(--neon)'>Consultando Scrydex...</p>";

        try {
            // Endpoint unificado de Scrydex (Pokemon TCG API v2)
            const url = `https://api.pokemontcg.io/v2/cards?q=name:"${encodeURIComponent(query)}"*&pageSize=5`;
            const response = await fetch(url, { headers: { "X-Api-Key": API_KEY } });
            const json = await response.json();

            if(!json.data || json.data.length === 0) {
                alert("No se encontró nada. Prueba con el nombre en inglés.");
                return;
            }

            if(type === 'val') {
                renderResults(json.data);
            } else {
                currentLargeImg = json.data[0].images.large;
                toggleGhost('front');
                alert("Imagen de referencia cargada.");
            }
        } catch (e) {
            console.error(e);
            alert("Error de red. Verifica tu conexión.");
        }
    }

    function renderResults(cards) {
        const resultsDiv = document.getElementById('results-val');
        resultsDiv.innerHTML = cards.map(c => {
            const price = c.tcgplayer?.prices?.holofoil?.market || c.tcgplayer?.prices?.normal?.market || "N/A";
            return `
                <div class="res-card">
                    <img src="${c.images.small}">
                    <div style="flex:1">
                        <b>${c.name}</b><br>
                        <small>${c.set.name} (#${c.number})</small>
                        <span class="price">$${price} USD</span>
                    </div>
                    <button class="btn btn-main" onclick="saveToDex('${c.name}', '${c.images.small}')"><i class="fas fa-plus"></i></button>
                </div>
            `;
        }).join('');
    }

    // --- FUNCIONES AI Y GHOST ---
    function aiScan() {
        const q = document.getElementById('searchInput').value;
        if(!q) {
            alert("Escribe el nombre. La AI analizará el HP y Número automáticamente al buscar.");
            return;
        }
        masterSearch('val');
    }

    function toggleGhost(mode) {
        const g = document.getElementById('ghost-overlay');
        if(mode === 'front') {
            if(!currentLargeImg) return alert("Busca una carta primero.");
            g.src = currentLargeImg;
        } else {
            g.src = CARD_BACK;
        }
        g.style.display = 'block';
    }

    function showTab(tabId, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.querySelectorAll('.top-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active-panel');
        btn.classList.add('active');

        const camViews = ['val', 'vf'];
        const container = document.getElementById('vision-container');
        const controls = document.getElementById('cam-controls');

        if(camViews.includes(tabId)) {
            container.style.display = 'block';
            controls.style.display = 'flex';
            initCamera();
        } else {
            container.style.display = 'none';
            controls.style.display = 'none';
            if(activeStream) activeStream.getTracks().forEach(t => t.stop());
        }
        if(tabId === 'dex') renderDex();
    }

    function saveToDex(name, img) {
        let dex = JSON.parse(localStorage.getItem('pokedex_v11') || '[]');
        dex.push({ name, img });
        localStorage.setItem('pokedex_v11', JSON.stringify(dex));
        alert("¡Añadida a tu colección!");
    }

    function renderDex() {
        const dex = JSON.parse(localStorage.getItem('pokedex_v11') || '[]');
        const list = document.getElementById('dex-list');
        if(dex.length === 0) { list.innerHTML = "<p>Tu Dex está vacío.</p>"; return; }
        list.innerHTML = dex.map(c => `<div class="dex-item"><img src="${c.img}"><p style="font-size:0.7rem">${c.name}</p></div>`).join('');
    }

    window.onload = listCameras;
</script>
</body>
</html>
