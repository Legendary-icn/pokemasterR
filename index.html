<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeMaster Elite v10.0 - Anti-CORS Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --red: #ff1f1f; --bg: #0d0d0d; --panel: #1a1a1e; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        .top-nav { 
            display: flex; background: #000; overflow-x: auto; position: sticky; top: 0; z-index: 1000;
            border-bottom: 2px solid var(--neon); scrollbar-width: none;
        }
        .top-nav button {
            flex: 1; padding: 15px; border: none; background: none; color: #666;
            font-size: 0.7rem; font-weight: bold; cursor: pointer; text-transform: uppercase;
            min-width: 90px; transition: 0.3s;
        }
        .top-nav button.active { color: var(--neon); background: rgba(0, 242, 255, 0.1); }
        .top-nav button i { display: block; font-size: 1.2rem; margin-bottom: 4px; }

        #vision-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-bottom: 1px solid #333; display: block; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #ghost-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; opacity: 0.5; pointer-events: none; display: none;
            border: 2px solid var(--neon); border-radius: 12px; box-shadow: 0 0 20px var(--neon);
        }

        .cam-bar { background: #111; padding: 10px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
        select { background: #222; color: var(--neon); border: 1px solid var(--neon); padding: 8px; border-radius: 5px; flex: 1; font-size: 14px; outline: none; }

        .content { padding: 15px; }
        .panel { display: none; }
        .active-panel { display: block; animation: fadeIn 0.4s; }

        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; outline: none; font-size: 16px; }
        .btn { background: var(--neon); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        
        .res-card { background: var(--panel); padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border: 1px solid #333; transition: 0.3s; }
        .res-card:active { transform: scale(0.98); background: #25252b; }
        .res-card img { width: 60px; border-radius: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .price { color: #00ff88; font-weight: bold; font-size: 1.1rem; text-shadow: 0 0 5px rgba(0,255,136,0.3); }

        .dex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .dex-item { background: var(--panel); padding: 8px; border-radius: 10px; text-align: center; border: 1px solid #444; position: relative; }
        .dex-item img { width: 100%; border-radius: 5px; }

        .deck-card { background: var(--panel); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--neon); }
        .deck-list { display: none; margin-top: 10px; font-size: 0.85rem; color: #aaa; background: #000; padding: 10px; border-radius: 8px; border: 1px dashed #444; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="top-nav">
    <button class="active" onclick="showTab('val', this)"><i class="fas fa-search-dollar"></i> Valor</button>
    <button onclick="showTab('vf', this)"><i class="fas fa-microscope"></i> V/F Check</button>
    <button onclick="showTab('dex', this)"><i class="fas fa-box-archive"></i> Mi Dex</button>
    <button onclick="showTab('decks', this)"><i class="fas fa-layer-group"></i> Decks</button>
</nav>

<div id="cam-controls" class="cam-bar">
    <i class="fas fa-video" style="color: var(--neon)"></i>
    <select id="camSelect" onchange="initCamera()"></select>
    <button class="btn" style="padding: 5px 10px;" onclick="initCamera()"><i class="fas fa-sync-alt"></i></button>
</div>

<div id="vision-container">
    <video id="video" autoplay playsinline></video>
    <img id="ghost-overlay" src="">
</div>

<div class="content">
    <div id="tab-val" class="panel active-panel">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Ej: Pikachu 151">
            <button class="btn" onclick="masterSearch('val')"><i class="fas fa-search"></i></button>
        </div>
        <div id="results-val"></div>
    </div>

    <div id="tab-vf" class="panel">
        <div class="search-box">
            <input type="text" id="vfInput" placeholder="Nombre (Ej: Mewtwo 150)">
            <button class="btn" onclick="masterSearch('vf')">CARGAR</button>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <button class="btn" style="flex:1" onclick="toggleGhost('front')">FRENTE</button>
            <button class="btn" style="flex:1; background:#333; color:white;" onclick="toggleGhost('back')">REVERSO</button>
        </div>
        <input type="range" min="0" max="100" value="50" style="width:100%; accent-color: var(--neon);" oninput="document.getElementById('ghost-overlay').style.opacity = this.value/100">
    </div>

    <div id="tab-dex" class="panel">
        <div id="dex-list" class="dex-grid"></div>
    </div>

    <div id="tab-decks" class="panel">
        <div class="deck-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b>Charizard ex (Meta)</b>
                <button class="btn" style="padding:5px 10px" onclick="toggleDeck('list-zard')">Ver</button>
            </div>
            <div id="list-zard" class="deck-list">
                • 3 Charizard ex (OBF 125)<br>• 2 Pidgeot ex (OBF 164)<br>• 4 Charmander / 1 Charmeleon<br>• 1 Radiant Charizard<br>• 4 Rare Candy / 4 Poffin
            </div>
        </div>
        <div class="deck-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b>Regidrago VSTAR</b>
                <button class="btn" style="padding:5px 10px" onclick="toggleDeck('list-drago')">Ver</button>
            </div>
            <div id="list-drago" class="deck-list">
                • 3 Regidrago VSTAR / 3 V<br>• 2 Teal Mask Ogerpon ex<br>• 1 Giratina VSTAR / 1 Dragapult ex<br>• 4 Professor's Research / 4 Iono
            </div>
        </div>
    </div>
</div>

<script>
    let activeStream;
    let vfGhostImg = "";
    const SCRYDEX_API_KEY = "52089a37-0a73-4782-ebfd-496bc5f101ac";
    const BACK_IMAGE = "https://images.pokemontcg.io/swsh1/back.png";

    // --- CÁMARA ---
    async function listCameras() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoIn = devices.filter(d => d.kind === 'videoinput');
            const select = document.getElementById('camSelect');
            select.innerHTML = videoIn.map((d, i) => `<option value="${d.deviceId}">${d.label || 'Cámara ' + (i+1)}</option>`).join('');
            if (videoIn.length > 0) initCamera();
        } catch (e) { console.error("Error cámara:", e); }
    }

    async function initCamera() {
        if (activeStream) activeStream.getTracks().forEach(t => t.stop());
        const id = document.getElementById('camSelect').value;
        try {
            activeStream = await navigator.mediaDevices.getUserMedia({ 
                video: { deviceId: id ? {exact: id} : undefined, facingMode: "environment" } 
            });
            document.getElementById('video').srcObject = activeStream;
        } catch (e) { console.error("Fallo stream:", e); }
    }

    function stopCamera() {
        if (activeStream) {
            activeStream.getTracks().forEach(track => track.stop());
            activeStream = null;
        }
    }

    // --- NAVEGACIÓN ---
    function showTab(tabId, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.querySelectorAll('.top-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active-panel');
        btn.classList.add('active');

        if (['val', 'vf'].includes(tabId)) {
            document.getElementById('vision-container').style.display = 'block';
            document.getElementById('cam-controls').style.display = 'flex';
            if (!activeStream) listCameras();
        } else {
            stopCamera();
            document.getElementById('vision-container').style.display = 'none';
            document.getElementById('cam-controls').style.display = 'none';
        }
        if(tabId === 'dex') renderDex();
    }

    // --- BÚSQUEDA ANTI-ERROR DE RED ---
    async function masterSearch(type) {
        const q = document.getElementById(type === 'val' ? 'searchInput' : 'vfInput').value;
        if(!q) return;

        const resultsDiv = document.getElementById('results-val');
        if(type === 'val') resultsDiv.innerHTML = "<p style='color:var(--neon)'>Analizando red...</p>";

        // Intentamos 2 métodos: Directo y luego Proxy si el directo falla
        try {
            const baseUrl = `https://api.pokemontcg.io/v2/cards?q=name:"${encodeURIComponent(q.trim())}"*&pageSize=5`;
            
            let response;
            try {
                // Intento 1: Directo
                response = await fetch(baseUrl, { headers: { "X-Api-Key": SCRYDEX_API_KEY } });
            } catch (err) {
                // Intento 2: Proxy de emergencia si falla el directo
                const proxy = "https://api.allorigins.win/get?url=";
                response = await fetch(proxy + encodeURIComponent(baseUrl));
                const proxyData = await response.json();
                processResults(JSON.parse(proxyData.contents).data, type);
                return;
            }

            const json = await response.json();
            processResults(json.data, type);

        } catch (e) {
            if(type === 'val') resultsDiv.innerHTML = "<p style='color:red'>Error Crítico. Intenta con un nombre más corto.</p>";
        }
    }

    function processResults(data, type) {
        if(!data || data.length === 0) {
            alert("Carta no encontrada");
            return;
        }
        if(type === 'val') {
            document.getElementById('results-val').innerHTML = data.map(c => `
                <div class="res-card">
                    <img src="${c.images.small}">
                    <div style="flex:1">
                        <b>${c.name}</b><br>
                        <span class="price">$${c.tcgplayer?.latestPrices?.holofoil?.market || c.tcgplayer?.latestPrices?.normal?.market || 'N/A'}</span>
                    </div>
                    <button class="btn" style="font-size:0.7rem" onclick="saveToDex('${c.name}', '${c.images.small}')"><i class="fas fa-plus"></i></button>
                </div>
            `).join('');
        } else {
            vfGhostImg = data[0].images.large;
            toggleGhost('front');
            alert("Guía V/F cargada.");
        }
    }

    // --- FUNCIONES EXTRA ---
    function toggleGhost(mode) {
        const g = document.getElementById('ghost-overlay');
        if(!vfGhostImg && mode === 'front') { alert("Busca una carta primero."); return; }
        g.style.display = 'block';
        g.src = (mode === 'front') ? vfGhostImg : BACK_IMAGE;
    }

    function toggleDeck(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function saveToDex(name, img) {
        let dex = JSON.parse(localStorage.getItem('pokedex_v10') || '[]');
        dex.push({ id: Date.now(), name, img });
        localStorage.setItem('pokedex_v10', JSON.stringify(dex));
        alert("¡Añadida!");
    }

    function renderDex() {
        const dex = JSON.parse(localStorage.getItem('pokedex_v10') || '[]');
        const container = document.getElementById('dex-list');
        if(dex.length === 0) { container.innerHTML = "<p style='color:#666'>Tu Dex está vacío.</p>"; return; }
        container.innerHTML = dex.map(c => `<div class="dex-item"><img src="${c.img}"><p style="font-size:0.6rem;margin-top:5px">${c.name}</p></div>`).join('');
    }

    window.onload = listCameras;
</script>
</body>
</html>
